<svg width="210" height="50" viewBox="0 0 210 50" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Graduation cap board/brim -->
  <rect x="1" y="1" width="42" height="8" rx="1.5" fill="#1a1a2e"/>

  <!-- Tassel: vertical line + ball hanging from left of cap -->
  <line x1="5" y1="9" x2="5" y2="20" stroke="#1a1a2e" stroke-width="2"/>
  <circle cx="5" cy="22.5" r="2.5" fill="#1a1a2e"/>

  <!-- Roof triangle -->
  <polygon points="22,9 3,28 41,28" fill="#1a1a2e"/>

  <!-- House body (blue) -->
  <rect x="5" y="27" width="34" height="22" rx="1" fill="#4B9CD3"/>

  <!-- Door (arched) -->
  <rect x="16" y="35" width="12" height="14" fill="white"/>
  <ellipse cx="22" cy="35" rx="6" ry="6" fill="white"/>

  <!-- GRADSPACE -->
  <text
    x="52" y="31"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="22"
    font-weight="900"
    fill="#1a1a2e"
    letter-spacing="0.5"
  >GRADSPACE</text>

  <!-- STUDENT HOUSING -->
  <text
    x="53" y="44"
    font-family="Arial, Helvetica, sans-serif"
    font-size="8.5"
    font-weight="400"
    fill="#444444"
    letter-spacing="3"
  >STUDENT HOUSING</text>

</svg>
