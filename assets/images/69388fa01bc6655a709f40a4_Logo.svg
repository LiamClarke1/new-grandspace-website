<svg width="210" height="50" viewBox="0 0 210 50" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Graduation cap board -->
  <rect x="1" y="1" width="42" height="6" rx="1" fill="#1a1a2e"/>

  <!-- Tassel: vertical line + ball hanging from left of cap -->
  <line x1="5" y1="7" x2="5" y2="18" stroke="#1a1a2e" stroke-width="1.5"/>
  <circle cx="5" cy="20.5" r="2" fill="#1a1a2e"/>

  <!-- Roof triangle -->
  <polygon points="22,7 4,25 40,25" fill="#1a1a2e"/>

  <!-- House body (blue) -->
  <rect x="6" y="24" width="32" height="22" rx="1" fill="#4B9CD3"/>

  <!-- Door (arched) -->
  <rect x="16" y="33" width="10" height="13" fill="white"/>
  <ellipse cx="21" cy="33" rx="5" ry="5" fill="white"/>

  <!-- GRADSPACE -->
  <text
    x="52" y="30"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="21"
    font-weight="900"
    fill="#1a1a2e"
    letter-spacing="0.4"
  >GRADSPACE</text>

  <!-- STUDENT HOUSING -->
  <text
    x="53" y="43"
    font-family="Arial, Helvetica, sans-serif"
    font-size="8.5"
    font-weight="400"
    fill="#555"
    letter-spacing="3"
  >STUDENT HOUSING</text>

</svg>
